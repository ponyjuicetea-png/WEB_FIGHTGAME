          if (monster.type === "boss") ctx.fillText("灰暗魔王", p.x, p.y - monster.radius - 18);
          if (monster.type === "darkMage") ctx.fillText("黑暗大法師", p.x, p.y - monster.radius - 18);
          if (monster.type === "greenGuard") ctx.fillText("綠國守軍首衛", p.x, p.y - monster.radius - 18);
          if (monster.type === "greenVillager") ctx.fillText("綠國農民", p.x, p.y - monster.radius - 18);
          if (monster.type === "greenMage") ctx.fillText("綠國法師團", p.x, p.y - monster.radius - 18);
        }

        const p = worldToScreen(game.player.x, game.player.y, camera);
        drawPlayer(p);
      }

      function drawPlayer(p) {
        const colors = {
          1: { body: "#d9dfde", accent: "#788482" },
          2: { body: "#4d1c27", accent: "#de6175" },
          3: { body: "#9f723f", accent: "#ecba74" },
          4: { body: "#446b93", accent: "#8ecaff" },
          5: { body: "#47857f", accent: "#aff9da" },
          6: { body: "#9f8c40", accent: "#ffe283" }
        }[game.selectedJob];
        ctx.fillStyle = colors.body;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = colors.accent;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + Math.cos(game.player.facing) * 32, p.y + Math.sin(game.player.facing) * 32);
        ctx.stroke();
      }

      function drawBar(x, y, w, h, ratio, bg, fg) {
        ctx.fillStyle = bg;
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = fg;
        ctx.fillRect(x + 1, y + 1, (w - 2) * clamp(ratio, 0, 1), h - 2);
      }

      function stageText() {
        if (game.stage === 1) {
          return [
            `第一關：採集與神社`,
            `木材 ${game.inventory.wood} / 40`,
            `石材 ${game.inventory.stone} / 28`,
            game.shrineDarkMagesSummoned ? `黑暗大法師討伐 ${game.totalDarkMageKills} / 4` : "前往神社對話召喚黑暗大法師"
          ];
        }
        if (game.stage === 2) {
          const turrets = game.buildings.filter((b) => b.alive && b.type === "turret").length;
          const camps = game.buildings.filter((b) => b.alive && b.type === "camp").length;
          const darkMageTowers = game.buildings.filter((b) => b.alive && b.type === "darkMageTower").length;
          return [
            "第二關：建立防線",
            `砲塔 ${turrets} / 9`,
            `營地 ${camps} / 3`,
            `黑暗小法師 ${darkMageTowers} / 2`,
            `敵怪擊殺 ${game.totalMonsterKills} / 50`
          ];
        }
        if (game.stage === 3) {
          return [
            "第三關：損壞的村莊",
            `山匪討伐 ${game.stage3BanditKills} / 15`,
            `黑暗大法師 ${game.stage3DarkMageKills} / 3`,
            `藍基地 ${game.villageBaseDestroyed ? "已摧毀" : "未摧毀"}`,
            `綠寶石 ${game.emeraldDelivered ? "已送回核心" : game.carryingEmerald ? "攜帶中" : "未取得"}`
          ];
        }
        if (game.greenCountryBossSpawned && !game.greenCountryBossDefeated) {
          return [
            "綠國大魔王戰",
            "綠國已被消滅，大魔王已現身",
            `黑暗大法師召喚倒數 ${formatTime(game.greenCountryBossSummonTimer)}`,
            "擊敗綠國大魔王後，綠國會成為你的地盤"
          ];
        }
        if (game.greenCountryBossDefeated) {
          return [
            "綠國已歸你所有",
            "你已征服綠國",
            "這裡現在是你的地盤",
            "可繼續推進主線與最終黑色禁地"
          ];
        }
        return [
          "第四關：灰暗魔王",
          game.bossSpawned ? "灰暗魔王已現身" : "前往黑色禁地按 E 召喚大魔王",
          game.bossSpawned ? "擊敗最終魔王，拯救世界。" : "做好準備後再開戰。"
        ];
      }

      function drawUi() {
        ctx.fillStyle = "rgba(8, 16, 12, 0.76)";
        ctx.fillRect(18, 18, 400, 224);
        ctx.strokeStyle = "rgba(197,255,208,0.16)";
        ctx.strokeRect(18, 18, 400, 224);
        ctx.fillStyle = "#effff0";
        ctx.font = "bold 28px 'Noto Sans TC', sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`第 ${game.day} 天`, 34, 52);
        ctx.fillText(`職業：${JOBS.find((j) => j.id === game.selectedJob).name}`, 34, 84);
        ctx.fillText(`等級 ${game.player.level}`, 34, 116);
        ctx.fillStyle = "#d5edd7";
        ctx.font = "22px 'Noto Sans TC', sans-serif";
        ctx.fillText(`敵怪 ${waveMonsterCount()}`, 34, 146);
        ctx.fillText(`永久紅寶石 ${game.permanentRubies}`, 34, 176);
        ctx.fillText(`菁英士兵 ${game.minions.filter((m) => m.alive && m.elite).length} / 小伐木工 ${game.minions.filter((m) => m.alive && m.gatherOnly).length}`, 34, 206);

        drawBar(452, 32, 320, 24, game.player.hp / game.player.maxHp, "rgba(20,20,20,0.85)", "#ff7474");
        drawBar(452, 86, 320, 24, game.player.cores / 100, "rgba(20,20,20,0.85)", "#ffd062");
        drawBar(452, 140, 320, 24, game.player.hunger / 100, "rgba(20,20,20,0.85)", "#8ddf84");
        ctx.fillStyle = "#fff";
        ctx.font = "22px 'Noto Sans TC', sans-serif";
        ctx.fillText(`生命 ${Math.max(0, Math.floor(game.player.hp))} / ${game.player.maxHp}`, 452, 28);
        ctx.fillText(`核心穩定度 ${Math.max(0, Math.floor(game.player.cores))} / 100`, 452, 82);
        ctx.fillText(`飽食 ${Math.floor(game.player.hunger)} / 100`, 452, 136);

        ctx.fillStyle = "rgba(8, 16, 12, 0.86)";
        ctx.fillRect(900, 18, 682, 256);
        ctx.strokeStyle = "rgba(197,255,208,0.16)";
        ctx.strokeRect(900, 18, 682, 256);
        ctx.fillStyle = "#ecffee";
        ctx.font = "bold 24px 'Noto Sans TC', sans-serif";
        ctx.fillText("關卡目標", 922, 48);
        ctx.font = "20px 'Noto Sans TC', sans-serif";
        let y = 82;
        for (const line of stageText()) {
          ctx.fillText(line, 922, y);
          y += 34;
        }

        ctx.fillStyle = "rgba(8, 16, 12, 0.86)";
        ctx.fillRect(18, 694, 660, 188);
        ctx.strokeStyle = "rgba(197,255,208,0.16)";
        ctx.strokeRect(18, 694, 660, 188);
        ctx.fillStyle = "#effff0";
        ctx.font = "20px 'Noto Sans TC', sans-serif";
        const buildLabel = BUILDINGS[game.selectedBuild]?.name || "圍牆";
        const poisonTip = game.player.poisonCooldown > 0 ? `右鍵毒藥水冷卻 ${game.player.poisonCooldown.toFixed(1)} 秒` : "右鍵可丟毒藥水";
        const lines = [
          "WASD 移動  |  左鍵射擊 / 建造  |  右鍵毒藥水  |  Space 近戰",
          "E 互動 / 採集 / 神社 / 傳送  |  Q 建造模式  |  1-5 切換建築",
          "H 釣魚  |  R 吃食物  |  T 丟炸彈  |  ESC 暫停 / 存讀檔",
          `目前建築：${buildLabel}  |  ${poisonTip}`
        ];
        lines.forEach((line, i) => ctx.fillText(line, 34, 730 + i * 38));

        ctx.fillStyle = "rgba(8, 16, 12, 0.86)";
        ctx.fillRect(1316, 690, 266, 192);
        ctx.strokeStyle = "rgba(197,255,208,0.16)";
        ctx.strokeRect(1316, 690, 266, 192);
        ctx.fillStyle = "#effff0";
        ctx.font = "bold 20px 'Noto Sans TC', sans-serif";
        ctx.fillText("小地圖", 1336, 720);
        const mapX = 1336;
        const mapY = 736;
        const mapW = 224;
        const mapH = 128;
        ctx.fillStyle = "#183220";
        ctx.fillRect(mapX, mapY, mapW, mapH);
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.strokeRect(mapX, mapY, mapW, mapH);
        const dot = (x, y, color, size = 4) => {
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(mapX + (x / WORLD_W) * mapW, mapY + (y / WORLD_H) * mapH, size, 0, Math.PI * 2);
          ctx.fill();
        };
        dot(game.player.x, game.player.y, "#fff", 5);
        dot(BASE_POS.x, BASE_POS.y, "#ffd574", 5);
        dot(SHRINE_POS.x, SHRINE_POS.y, "#e8ffd0", 4);
        dot(GREEN_COUNTRY.x, GREEN_COUNTRY.y, "#82df91", 5);
        dot(VILLAGE_POS.x, VILLAGE_POS.y, "#e1b8a8", 4);
        dot(BOSS_ZONE_POS.x, BOSS_ZONE_POS.y, "#ff7d88", 4);
        game.buildings.filter((b) => b.alive && b.type === "house").forEach((b) => dot(b.x, b.y, "#c8a885", 3));
        game.minions.filter((m) => m.alive && m.elite).forEach((m) => dot(m.x, m.y, "#f0ca5f", 2.7));
        game.minions.filter((m) => m.alive && m.gatherOnly).forEach((m) => dot(m.x, m.y, "#8cd47a", 2.2));
        game.monsters.filter((m) => m.alive && m.faction === "monster").forEach((m) => dot(m.x, m.y, "#ff877c", 2.1));
        game.monsters.filter((m) => m.alive && m.faction === "green").forEach((m) => dot(m.x, m.y, "#75d881", 2.1));

        if (game.messages.length > 0) {
          ctx.fillStyle = "rgba(8, 16, 12, 0.78)";
          ctx.fillRect(410, 822, 780, 48);
          ctx.strokeStyle = "rgba(255,255,255,0.12)";
          ctx.strokeRect(410, 822, 780, 48);
          ctx.fillStyle = "#fff2c8";
          ctx.font = "22px 'Noto Sans TC', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(game.messages[0].text, 800, 854);
          ctx.textAlign = "left";
        }

        if (game.activeShop) drawShopPanel();
        if (game.pause) drawPausePanel();
        if (game.scene === "gameover") drawGameOver();
        if (game.scene === "victory") drawVictory();
      }

      function drawShopPanel() {
        ctx.fillStyle = "rgba(8,12,10,0.94)";
        ctx.fillRect(470, 180, 660, 340);
        ctx.strokeStyle = "rgba(220,255,228,0.22)";
        ctx.strokeRect(470, 180, 660, 340);
        ctx.fillStyle = "#effff0";
        ctx.font = "bold 34px 'Noto Sans TC', sans-serif";
        let title = "商店";
        let lines = [];
        if (game.activeShop === "bomb") {
          title = "炸彈店";
          lines = ["按 1：20 水晶換 10 個炸彈"];
        } else if (game.activeShop === "grocery") {
          title = "超市";
          lines = ["按 1：20 木材換 4 個肉"];
        } else if (game.activeShop === "tools") {
          title = "工具行";
          lines = ["按 1：40 纖維換 劍", "按 2：30 水晶換 盔甲", "按 3：35 水晶換 藥水強化"];
        }
        ctx.fillText(title, 520, 236);
        ctx.font = "26px 'Noto Sans TC', sans-serif";
        lines.forEach((line, i) => ctx.fillText(line, 520, 298 + i * 48));
        ctx.fillStyle = "#d4ebd7";
        ctx.font = "22px 'Noto Sans TC', sans-serif";
        ctx.fillText("按 ESC 關閉商店", 520, 470);
      }

      function drawPausePanel() {
        ctx.fillStyle = "rgba(4,8,7,0.72)";
        ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
        ctx.fillStyle = "rgba(10,18,14,0.96)";
        ctx.fillRect(480, 160, 640, 420);
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.strokeRect(480, 160, 640, 420);
        ctx.fillStyle = "#effff0";
        ctx.font = "bold 40px 'Noto Sans TC', sans-serif";
        ctx.fillText("暫停選單", 540, 226);
        ctx.font = "26px 'Noto Sans TC', sans-serif";
        ctx.fillText("F5：快速存檔", 540, 302);
        ctx.fillText("F9：快速讀檔", 540, 350);
        ctx.fillText("O：匯出文字存檔", 540, 398);
        ctx.fillText("I：載入文字存檔", 540, 446);
        ctx.fillText("ESC：返回遊戲", 540, 494);
      }

      function drawTitle() {
        const g = ctx.createLinearGradient(0, 0, 0, SCREEN_H);
        g.addColorStop(0, "#0a120e");
        g.addColorStop(1, "#151f18");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);

        ctx.fillStyle = "rgba(93, 168, 110, 0.08)";
        for (let i = 0; i < 18; i++) {
          ctx.beginPath();
          ctx.arc(rand(0, SCREEN_W), rand(0, SCREEN_H), rand(40, 180), 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "#f3ffef";
        ctx.textAlign = "left";
        ctx.font = "bold 64px 'Noto Sans TC', sans-serif";
        ctx.fillText("邊境據點", 120, 130);
        ctx.fillStyle = "#cde7cf";
        ctx.font = "28px 'Noto Sans TC', sans-serif";
        ctx.fillText("開放世界生存建造 / 綠國 / 神社 / Boss 戰 / 多職業 Web 版", 122, 178);

        ctx.fillStyle = "rgba(11,18,14,0.86)";
        ctx.fillRect(100, 236, 1400, 520);
        ctx.strokeStyle = "rgba(216,255,226,0.12)";
        ctx.strokeRect(100, 236, 1400, 520);
        ctx.fillStyle = "#effff0";
        ctx.font = "bold 34px 'Noto Sans TC', sans-serif";
        ctx.fillText("請先選職業", 132, 286);
        ctx.font = "24px 'Noto Sans TC', sans-serif";
        JOBS.forEach((job, index) => {
          const y = 338 + index * 62;
          const selected = game.selectedJob === job.id;
          ctx.fillStyle = selected ? "rgba(130, 222, 123, 0.18)" : "transparent";
          ctx.fillRect(126, y - 30, 1340, 46);
          ctx.fillStyle = selected ? "#f7ffd9" : "#dbeedd";
          ctx.fillText(`${job.key}. ${job.name}：${job.desc}`, 144, y);
        });
        ctx.fillStyle = "#fff2c8";
        ctx.font = "28px 'Noto Sans TC', sans-serif";
        ctx.fillText("按 Enter 開始新遊戲", 132, 700);
        ctx.fillText("按 L 載入遊戲", 132, 738);
        ctx.fillStyle = "#d6e7d7";
        ctx.fillText(`永久紅寶石：${game.permanentRubies}`, 1110, 700);
        ctx.font = "22px 'Noto Sans TC', sans-serif";
        ctx.fillText("這版支援 localStorage 快速存檔，也支援匯出/載入文字存檔。", 1110, 740);
      }

      function drawIntro() {
        const alpha = clamp(game.introTimer / 1.2, 0, 1);
        ctx.fillStyle = `rgba(6, 8, 7, ${0.92 * alpha})`;
        ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
        ctx.fillStyle = "rgba(150, 34, 34, 0.16)";
        for (let i = 0; i < 8; i++) {
          ctx.beginPath();
          ctx.arc(240 + i * 170, 220 + Math.sin(game.introTimer * 1.2 + i) * 32, 90 + i * 10, 0, Math.PI * 2);
          ctx.fill();
        }
        const text = "世界已被怪物摧毀，你是唯一的倖存者，請你拯救世界，殺死統治世界的灰暗魔王，祝你好運！";
        const chars = Math.floor(clamp(game.introTimer * 10, 0, text.length));
        ctx.fillStyle = "#f2fff1";
        ctx.font = "bold 60px 'Noto Sans TC', sans-serif";
        ctx.fillText("末日序章", 180, 210);
        ctx.font = "36px 'Noto Sans TC', sans-serif";
        wrapText(text.slice(0, chars), 180, 330, 1040, 58, "#ebf6e8");
        ctx.fillStyle = "#ffe8bf";
        ctx.font = "26px 'Noto Sans TC', sans-serif";
        ctx.fillText("按 Enter 或 Space 可略過", 182, 720);
      }

      function drawGameOver() {
        ctx.fillStyle = "rgba(6, 4, 4, 0.68)";
        ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
        ctx.fillStyle = "#fff1f1";
        ctx.font = "bold 72px 'Noto Sans TC', sans-serif";
        ctx.fillText("你失敗了", 610, 320);
        ctx.font = "28px 'Noto Sans TC', sans-serif";
        ctx.fillText("按 R 重新開始，或按 L 載入最近存檔。", 520, 396);
      }

      function drawVictory() {
        ctx.fillStyle = "rgba(6, 12, 7, 0.64)";
        ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
        ctx.fillStyle = "#faffd9";
        ctx.font = "bold 72px 'Noto Sans TC', sans-serif";
        ctx.fillText("世界得救了", 560, 300);
        ctx.font = "30px 'Noto Sans TC', sans-serif";
        ctx.fillText("你擊敗了灰暗魔王，邊境據點迎來新的曙光。", 430, 368);
        ctx.fillText("按 R 回到標題重新開始。", 570, 426);
      }

      function wrapText(text, x, y, maxWidth, lineHeight, color = "#fff") {
        ctx.fillStyle = color;
        let line = "";
        let offsetY = 0;
        for (const ch of text) {
          const test = line + ch;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y + offsetY);
            line = ch;
            offsetY += lineHeight;
          } else {
            line = test;
          }
        }
        if (line) ctx.fillText(line, x, y + offsetY);
      }

      function render() {
        ctx.clearRect(0, 0, SCREEN_W, SCREEN_H);
        if (game.scene === "title") {
          drawTitle();
          return;
        }
        if (game.scene === "intro") {
          drawIntro();
          return;
        }
        drawWorld();
        drawUi();
      }

      function purchaseShopItem(key) {
        if (!game.activeShop) return;
        if (game.activeShop === "bomb" && key === "Digit1") {
          if (game.inventory.crystal >= 20) {
            game.inventory.crystal -= 20;
            game.inventory.bomb += 10;
            pushMessage("買到 10 個炸彈。", 2.2);
          } else pushMessage("水晶不足。", 2.2);
        }
        if (game.activeShop === "grocery" && key === "Digit1") {
          if (game.inventory.wood >= 20) {
            game.inventory.wood -= 20;
            game.inventory.meat += 4;
            pushMessage("換到 4 個肉。", 2.2);
          } else pushMessage("木材不足。", 2.2);
        }
        if (game.activeShop === "tools") {
          if (key === "Digit1") {
            if (game.inventory.fiber >= 40) {
              game.inventory.fiber -= 40;
              game.hasSword = true;
              pushMessage("你獲得了劍。", 2.2);
            } else pushMessage("纖維不足。", 2.2);
          }
          if (key === "Digit2") {
            if (game.inventory.crystal >= 30) {
              game.inventory.crystal -= 30;
              game.hasArmor = true;
              pushMessage("你獲得了盔甲。", 2.2);
            } else pushMessage("水晶不足。", 2.2);
          }
          if (key === "Digit3") {
            if (game.inventory.crystal >= 35) {
              game.inventory.crystal -= 35;
              game.hasPoisonUpgrade = true;
              pushMessage("你的毒藥已被強化。", 2.2);
            } else pushMessage("水晶不足。", 2.2);
          }
        }
      }

      function serializeInput(event) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * SCREEN_W;
        mouse.y = ((event.clientY - rect.top) / rect.height) * SCREEN_H;
        mouse.worldX = mouse.x + game.camera.x;
        mouse.worldY = mouse.y + game.camera.y;
      }

      window.addEventListener("keydown", (event) => {
        if (game.scene === "title") {
          const job = JOBS.find((j) => event.code === `Digit${j.id}`);
          if (job) game.selectedJob = job.id;
          if (event.code === "Enter") startGame();
          if (event.code === "KeyL" && loadLocal()) pushMessage("已載入本機存檔。", 2.8);
          return;
        }
        if (game.scene === "intro") {
          if (event.code === "Enter" || event.code === "Space") game.scene = "playing";
          return;
        }
        if (game.scene === "gameover") {
          if (event.code === "KeyR") { game.scene = "title"; }
          if (event.code === "KeyL") loadLocal();
          return;
        }
        if (game.scene === "victory") {
          if (event.code === "KeyR") game.scene = "title";
          return;
        }

        if (event.code === "Escape") {
          if (game.activeShop) {
            game.activeShop = null;
          } else {
            game.pause = !game.pause;
          }
          return;
        }

        if (game.pause) {
          if (event.code === "F5") { saveLocal(); pushMessage("已快速存檔。", 2.4); }
          if (event.code === "F9") { if (loadLocal()) pushMessage("已載入快速存檔。", 2.4); }
          if (event.code === "KeyO") exportTxtSave();
          if (event.code === "KeyI") importInput.click();
          return;
        }

        if (game.activeShop) {
          purchaseShopItem(event.code);
          return;
        }

        keys.add(event.code);
        if (event.code === "KeyE") interact();
        if (event.code === "Space") meleeAttack();
        if (event.code === "KeyH") fishAction();
        if (event.code === "KeyR") eatFood();
        if (event.code === "KeyT") throwBomb();
        if (event.code === "KeyQ") game.buildMode = !game.buildMode;
        if (event.code === "Digit1") game.selectedBuild = "wall";
        if (event.code === "Digit2") game.selectedBuild = "turret";
        if (event.code === "Digit3") game.selectedBuild = "camp";
        if (event.code === "Digit4") game.selectedBuild = "darkMageTower";
        if (event.code === "Digit5") game.selectedBuild = "house";
        if (event.code === "F5") { saveLocal(); pushMessage("已快速存檔。", 2.4); }
        if (event.code === "F9") { if (loadLocal()) pushMessage("已載入快速存檔。", 2.4); }
      });

      window.addEventListener("keyup", (event) => {
        keys.delete(event.code);
      });

      canvas.addEventListener("mousemove", serializeInput);
      canvas.addEventListener("mousedown", (event) => {
        serializeInput(event);
        if (event.button === 0) mouse.left = true;
        if (event.button === 2) { mouse.right = true; throwPoisonPotion(); }
      });
      canvas.addEventListener("mouseup", (event) => {
        if (event.button === 0) mouse.left = false;
        if (event.button === 2) mouse.right = false;
      });
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());

      function loop(now) {
        const dt = clamp((now - lastTime) / 1000, 0, 0.033);
        lastTime = now;
        update(dt);
        render();
        requestAnimationFrame(loop);
      }

      render();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
